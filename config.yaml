system:
  name: "AI Trading Empire"
  mode: "paper"
  log_level: "INFO"

data:
  crypto:
    exchange: "binance"
    symbols: ["BTC/USDT"]
    timeframes: ["1m", "5m"]
    lookback_days: 1
    use_testnet: true

owner:
  max_population: 50           # Abhi ke liye 50 rakha hai taaki build pass ho
  review_interval_minutes: 5
  consensus_interval_minutes: 5

factory:
  enabled: true
  population_size: 10

serving:
  api:
    enabled: true
    port: 8000
  dashboard:
    enabled: true
    port: 8501
