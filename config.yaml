system:
  name: "AI Trading Empire"
  mode: "paper"
  log_level: "INFO"

data:
  crypto_sources: ["binance", "coinbase"]
  symbols: ["BTC/USDT"]
  timeframes: ["1m", "3m", "5m", "15m"]
  forex_symbols: ["XAUUSD=X", "EURUSD=X", "GBPUSD=X", "JPYUSD=X"]
  news_source: "https://cryptopanic.com/api/v1/posts/?auth_token=PUBLIC&kind=news"

owner:
  max_population: 1000
  review_interval_minutes: 1
  min_confluence_level: 3

factory:
  enabled: true
  population_size: 20

serving:
  api_port: 8000
  ui_port: 3000